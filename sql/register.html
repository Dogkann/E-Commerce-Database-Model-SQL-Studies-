<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeni Admin Kaydı</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="login-body">

    <div class="login-container">
        <h2><i class="fas fa-user-plus"></i> Kayıt Ol</h2>
        
        <form action="login.html">
            
            <div class="input-group">
                <i class="fas fa-id-card"></i>
                <input type="text" placeholder="Adınız Soyadınız" required>
            </div>

            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" placeholder="E-Posta Adresi" required>
            </div>

            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" placeholder="Kullanıcı Adı" required>
            </div>
            
            <div class="input-group">
                <i class="fas fa-key"></i>
                <input type="password" placeholder="Şifre" required>
            </div>

            <button type="submit" class="btn-register">Kayıt İşlemini Tamamla</button>
            
            <div class="form-footer">
                <p>Zaten bir hesabın var mı? <a href="login.html">Giriş Yap</a></p>
            </div>

        </form>
    </div>

</body>
</html>
